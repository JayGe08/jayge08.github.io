<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1024">
<title>光能小勇士 · 汉字大冒险</title>
<style>
  :root{
    --void:#0b1024;
    --void-2:#141b3d;
    --panel:#1b2350;
    --panel-line: rgba(255,255,255,0.08);
    --silver:#c9d3ea;
    --silver-dim:#8791b8;
    --hero-red:#ff4d5e;
    --hero-red-deep:#c81e37;
    --energy:#ffd93d;
    --energy-glow:#fff3b0;
    --cyan:#4de8ff;
    --good:#57e389;
    --white:#f6f8ff;
    --font-display: "YouYuan","Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
    --font-body: "PingFang SC","Microsoft YaHei","Heiti SC",sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(ellipse at 20% -10%, #263173 0%, transparent 55%),
      radial-gradient(ellipse at 100% 10%, #2c1b4d 0%, transparent 50%),
      var(--void);
    color:var(--white);
    font-family: var(--font-body);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{ min-height:100%; display:flex; flex-direction:column; align-items:center; padding-bottom:40px;}

  /* ---------- stars bg ---------- */
  #stars{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.55;}

  /* ---------- top bar ---------- */
  .topbar{
    width:100%; max-width:520px; display:flex; align-items:center; justify-content:space-between;
    padding:18px 18px 10px; position:relative; z-index:2;
  }
  .brand{
    font-family: var(--font-display);
    font-size:22px; font-weight:800; letter-spacing:1px;
    display:flex; align-items:center; gap:8px;
    color:var(--white);
    text-shadow: 0 0 18px rgba(77,232,255,.5);
  }
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--energy); box-shadow:0 0 10px var(--energy);}
  .progress-pill{
    background:var(--panel); border:1px solid var(--panel-line); border-radius:999px;
    padding:6px 14px; font-size:13px; color:var(--silver); display:flex; align-items:center; gap:6px;
  }
  .progress-pill b{color:var(--energy); font-size:14px;}

  /* ---------- screen switching ---------- */
  .screen{ width:100%; max-width:520px; position:relative; z-index:2; padding:0 16px; animation: fadein .35s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .hidden{display:none !important;}

  /* ================= HOME / MAP ================= */
  .hero-banner{
    margin:6px 0 18px; border-radius:22px; padding:20px 18px;
    background: linear-gradient(135deg, #1c2560 0%, #2a1c55 100%);
    border:1px solid var(--panel-line);
    display:flex; align-items:center; gap:14px;
    position:relative; overflow:hidden;
  }
  .hero-banner::after{
    content:""; position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:50%;
    background: radial-gradient(circle, rgba(77,232,255,.25), transparent 70%);
  }
  .hero-avatar{ width:64px; height:64px; flex-shrink:0; }
  .hero-banner-text{position:relative; z-index:1;}
  .hero-banner-text h1{ margin:0 0 4px; font-size:17px; font-family:var(--font-display); }
  .hero-banner-text p{ margin:0; font-size:13px; color:var(--silver); line-height:1.5;}

  .review-card{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:linear-gradient(135deg,#2c1a3f,#1b1440); border:1px solid rgba(255,105,135,.25);
    border-radius:18px; padding:14px 16px; margin-bottom:18px; cursor:pointer;
    transition: transform .15s ease;
  }
  .review-card:active{ transform:scale(.97); }
  .review-card .rc-left{display:flex; align-items:center; gap:10px;}
  .review-card .rc-icon{
    width:38px;height:38px;border-radius:12px; background:rgba(255,77,94,.15);
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .review-card h3{ margin:0 0 2px; font-size:14px; }
  .review-card p{ margin:0; font-size:12px; color:var(--silver-dim); }
  .review-card .rc-count{
    background:var(--hero-red); color:white; font-size:12px; font-weight:700;
    padding:3px 10px; border-radius:999px;
  }

  .map-section-title{
    font-size:13px; color:var(--silver-dim); margin:22px 4px 10px; letter-spacing:2px; text-transform:uppercase;
  }

  .level-path{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .level-row{ display:flex; align-items:center; width:100%; gap:14px; }
  .level-row.right{ flex-direction:row-reverse; }
  .level-node-wrap{ display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
  .connector{ width:2px; height:26px; background:linear-gradient(var(--panel-line), transparent); align-self:center; }

  .level-node{
    width:74px; height:74px; border-radius:22px; position:relative;
    display:flex; align-items:center; justify-content:center; font-size:28px;
    border:2px solid var(--panel-line); background:var(--panel);
    transition: transform .15s ease;
  }
  .level-node:active{ transform:scale(.94); }
  .level-node.locked{ opacity:.4; filter:grayscale(1); }
  .level-node.done{ border-color: var(--good); box-shadow:0 0 16px rgba(87,227,137,.35); }
  .level-node.current{ border-color: var(--energy); box-shadow:0 0 18px rgba(255,217,61,.45); animation: pulse 1.8s infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 10px rgba(255,217,61,.35);} 50%{ box-shadow:0 0 22px rgba(255,217,61,.65);} }
  .level-num{ position:absolute; top:-6px; left:-6px; background:var(--void-2); border:1px solid var(--panel-line); border-radius:8px; font-size:10px; padding:2px 5px; color:var(--silver-dim); font-family:var(--font-body); }
  .level-stars{ font-size:11px; letter-spacing:1px; color:var(--energy); height:12px; }
  .lock-badge{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--silver-dim); }

  /* ================= BATTLE SCREEN ================= */
  .battle-header{ display:flex; align-items:center; justify-content:space-between; margin:8px 0 6px; }
  .back-btn{ background:none; border:none; color:var(--silver); font-size:14px; display:flex; align-items:center; gap:4px; padding:8px 4px; }
  .monster-title{ font-size:14px; color:var(--silver); }
  .monster-title b{ color:var(--white); }

  .arena{
    border-radius:24px; padding:18px 16px 22px; margin:10px 0 16px; position:relative; overflow:hidden;
    background: linear-gradient(160deg, var(--arena-a,#22285c), var(--arena-b,#171c40));
    border:1px solid var(--panel-line);
  }
  .combatants{ display:flex; align-items:flex-end; justify-content:space-between; padding:6px 6px 14px; }
  .combatant{ display:flex; flex-direction:column; align-items:center; width:42%; }
  .combatant svg{ width:100%; height:auto; max-width:120px; filter: drop-shadow(0 8px 10px rgba(0,0,0,.35)); }
  .hp-wrap{ width:100%; margin-top:8px; }
  .hp-label{ font-size:10px; color:var(--silver-dim); display:flex; justify-content:space-between; margin-bottom:3px; }
  .hp-bar{ height:8px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden; }
  .hp-fill{ height:100%; border-radius:6px; transition: width .4s ease; }
  .hp-fill.hero{ background: linear-gradient(90deg, var(--energy), #ffbf3d); }
  .hp-fill.monster{ background: linear-gradient(90deg, #ff6b81, var(--hero-red-deep)); }

  .vs-badge{
    position:absolute; left:50%; top:36%; transform:translate(-50%,-50%);
    font-family:var(--font-display); font-size:13px; color:var(--silver-dim);
    background:var(--void-2); border:1px solid var(--panel-line); border-radius:999px; padding:4px 10px;
  }

  .beam{ position:absolute; height:6px; border-radius:6px; background:linear-gradient(90deg, var(--cyan), var(--energy)); opacity:0; box-shadow:0 0 14px var(--cyan); }
  .beam.fire{ animation: beamfire .45s ease forwards; }
  @keyframes beamfire{ 0%{opacity:0; transform:scaleX(0);} 25%{opacity:1;} 80%{opacity:1; transform:scaleX(1);} 100%{opacity:0; transform:scaleX(1);} }

  .shake{ animation: shakeit .35s ease; }
  @keyframes shakeit{ 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(3px);} 30%,50%,70%{transform:translateX(-5px);} 40%,60%{transform:translateX(5px);} }

  .flash-good{ animation: flashgood .5s ease; }
  @keyframes flashgood{ 0%{ filter:brightness(1);} 30%{filter:brightness(1.6);} 100%{filter:brightness(1);} }

  /* --- question card --- */
  .qcard{
    background:var(--panel); border:1px solid var(--panel-line); border-radius:22px;
    padding:26px 16px 20px; text-align:center; margin-bottom:14px;
  }
  .qhint{ font-size:12px; color:var(--silver-dim); margin-bottom:8px; letter-spacing:1px;}
  .hanzi-big{
    font-size:88px; line-height:1; font-weight:700; margin:4px 0 8px;
    color:var(--white); text-shadow:0 0 22px rgba(77,232,255,.25);
    font-family: var(--font-body);
  }
  .word-hints{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:18px; min-height:26px; }
  .word-chip{
    font-size:13px; color:var(--silver); background:var(--void-2); border:1px solid var(--panel-line);
    border-radius:999px; padding:4px 12px; display:flex; align-items:center; gap:4px;
    transition: all .15s ease;
  }
  .word-chip.speaking{ border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 10px rgba(77,232,255,.4); }
  .reading-status{ font-size:12px; color:var(--cyan); margin:-6px 0 14px; letter-spacing:1px; }
  .options{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .opt-btn{
    background:var(--void-2); border:1px solid var(--panel-line); color:var(--white);
    border-radius:14px; padding:14px 8px; font-size:19px; font-weight:600;
    transition: all .15s ease;
  }
  .opt-btn:active{ transform:scale(.96); }
  .opt-btn.correct{ background:rgba(87,227,137,.18); border-color:var(--good); color:var(--good); }
  .opt-btn.wrong{ background:rgba(255,77,94,.18); border-color:var(--hero-red); color:var(--hero-red); }
  .opt-btn[disabled]{ pointer-events:none; }

  .queue-strip{ display:flex; gap:6px; overflow-x:auto; padding:2px 2px 4px; margin-bottom:2px; }
  .queue-chip{ flex-shrink:0; width:30px; height:30px; border-radius:9px; background:var(--void-2); border:1px solid var(--panel-line); display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--silver-dim); }
  .queue-chip.active{ border-color:var(--energy); color:var(--energy); }

  /* ================= RESULT SCREEN ================= */
  .result-wrap{ text-align:center; padding:30px 10px 10px; }
  .result-badge{ font-size:64px; margin-bottom:10px; }
  .result-title{ font-family:var(--font-display); font-size:22px; margin:0 0 6px; }
  .result-sub{ color:var(--silver); font-size:14px; margin:0 0 20px; }
  .stars-row{ font-size:34px; letter-spacing:8px; margin-bottom:24px; }
  .primary-btn{
    width:100%; padding:15px; border:none; border-radius:16px; font-size:16px; font-weight:700;
    background:linear-gradient(135deg, var(--hero-red), var(--hero-red-deep)); color:white; margin-bottom:10px;
    box-shadow: 0 8px 20px rgba(255,77,94,.3);
  }
  .primary-btn:active{ transform:scale(.98); }
  .ghost-btn{
    width:100%; padding:14px; border:1px solid var(--panel-line); border-radius:16px; font-size:14px;
    background:transparent; color:var(--silver);
  }

  /* ================= FOOTER NOTE ================= */
  .footnote{ text-align:center; color:var(--silver-dim); font-size:11px; margin-top:26px; line-height:1.6; padding:0 20px;}

  button{ font-family:inherit; cursor:pointer; }
</style>
</head>

<body>
<canvas id="stars"></canvas>
<div id="app">

  <div class="topbar">
    <div class="brand"><span class="dot"></span>光能小勇士</div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="soundToggle" class="progress-pill" style="border:1px solid var(--panel-line); font-size:16px; padding:6px 10px;">🔊</button>
      <div class="progress-pill">已认字 <b id="learnedCount">0</b>&nbsp;/ 1000</div>
    </div>
  </div>

  <!-- ===================== HOME SCREEN ===================== -->
  <div class="screen" id="screen-home">
    <div class="hero-banner">
      <svg class="hero-avatar" viewBox="0 0 100 100"><use href="#svg-hero-face"/></svg>
      <div class="hero-banner-text">
        <h1>准备好认字大冒险了吗？</h1>
        <p>每一关都有一只汉字小怪兽，认对拼音就能发出光波，把它们统统打败吧！</p>
      </div>
    </div>

    <div class="review-card hidden" id="reviewCard">
      <div class="rc-left">
        <div class="rc-icon">📖</div>
        <div>
          <h3>怪兽笔记本</h3>
          <p>复习答错过的字，彻底学会它</p>
        </div>
      </div>
      <div class="rc-count" id="reviewCount">0</div>
    </div>

    <div class="map-section-title">闯关地图</div>
    <div class="level-path" id="levelPath"></div>

    <div class="footnote">共 50 关 · 1000 个常用汉字 · 进度会自动保存</div>
  </div>

  <!-- ===================== BATTLE SCREEN ===================== -->
  <div class="screen hidden" id="screen-battle">
    <div class="battle-header">
      <button class="back-btn" id="backBtn">‹ 返回地图</button>
      <div class="monster-title">第 <b id="battleLevelNum">1</b> 关 · <b id="battleMonsterName">小石怪</b></div>
    </div>

    <div class="arena" id="arena">
      <div class="vs-badge">VS</div>
      <div class="combatants">
        <div class="combatant" id="heroCombatant">
          <svg viewBox="0 0 100 120"><use href="#svg-hero-full"/></svg>
          <div class="hp-wrap">
            <div class="hp-label"><span>勇士能量</span><span id="heroHpLabel">0%</span></div>
            <div class="hp-bar"><div class="hp-fill hero" id="heroHp" style="width:0%"></div></div>
          </div>
        </div>
        <div class="combatant" id="monsterCombatant">
          <svg viewBox="0 0 100 100" id="monsterSvg"><use href="#svg-monster-rock"/></svg>
          <div class="hp-wrap">
            <div class="hp-label"><span id="monsterHpName">小石怪</span><span id="monsterHpLabel">100%</span></div>
            <div class="hp-bar"><div class="hp-fill monster" id="monsterHp" style="width:100%"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="queue-strip" id="queueStrip"></div>

    <div class="qcard">
      <div class="qhint">这个字读什么？点击正确的拼音</div>
      <div class="hanzi-big" id="hanziBig">的</div>
      <div class="word-hints" id="wordHints"></div>
      <div class="reading-status hidden" id="readingStatus">🔊 正在朗读组词…</div>
      <div class="options" id="options"></div>
    </div>
  </div>

  <!-- ===================== RESULT SCREEN ===================== -->
  <div class="screen hidden" id="screen-result">
    <div class="result-wrap">
      <div class="result-badge" id="resultBadge">🎉</div>
      <h2 class="result-title" id="resultTitle">怪兽被打败了！</h2>
      <p class="result-sub" id="resultSub">你认识了 20 个新汉字</p>
      <div class="stars-row" id="resultStars">★★★</div>
      <button class="primary-btn" id="nextLevelBtn">前往下一关</button>
      <button class="ghost-btn" id="mapBtn">返回地图</button>
    </div>
  </div>

</div>

let soundOn = true;
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, duration, opts={}){
  if(!soundOn) return;
  const ctx = ensureAudio(); if(!ctx) return;
  const t0 = ctx.currentTime + (opts.delay || 0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = opts.type || "sine";
  osc.frequency.setValueAtTime(freq, t0);
  if(opts.toFreq){ osc.frequency.exponentialRampToValueAtTime(opts.toFreq, t0 + duration); }
  const vol = opts.gain || 0.16;
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + Math.min(0.02, duration/4));
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + duration + 0.02);
}
function noiseBurst(duration=0.25, gain=0.2, delay=0){
  if(!soundOn) return;
  const ctx = ensureAudio(); if(!ctx) return;
  const t0 = ctx.currentTime + delay;
  const bufferSize = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  src.connect(g); g.connect(ctx.destination);
  src.start(t0);
}
const SFX = {
  click(){ tone(700, 0.05, {type:"square", gain:0.08}); },
  correctBeam(){
    // rising charge + laser sweep, like a hero's energy beam
    tone(500, 0.12, {type:"sine", toFreq:1400, gain:0.1});
    tone(1800, 0.28, {type:"sawtooth", toFreq:350, gain:0.14, delay:0.1});
    noiseBurst(0.15, 0.1, 0.3);
  },
  wrong(){
    tone(320, 0.28, {type:"square", toFreq:120, gain:0.13});
  },
  powerUp(){
    // transformation-style rising tone
    tone(180, 0.55, {type:"sine", toFreq:1100, gain:0.13});
    tone(90, 0.55, {type:"triangle", toFreq:500, gain:0.08, delay:0.05});
  },
  victory(){
    tone(523, 0.16, {type:"triangle", gain:0.14});
    tone(659, 0.16, {type:"triangle", gain:0.14, delay:0.16});
    tone(784, 0.32, {type:"triangle", gain:0.16, delay:0.32});
  },
  monsterDown(){
    noiseBurst(0.35, 0.22, 0);
    tone(90, 0.4, {type:"square", toFreq:40, gain:0.15, delay:0.02});
  }
};

/* speak 2-3 vocabulary words for a character aloud, then call onDone.
   If speech isn't available/enabled, wait a short reading pause instead
   so the next word never appears before this one has had time to sink in. */
function speakWordsThen(hanzi, onDone){
  const words = CHAR_WORDS[hanzi] || [];
  const canSpeak = soundOn && ("speechSynthesis" in window) && words.length > 0;

  if(!canSpeak){
    setTimeout(onDone, 1100);
    return;
  }

  window.speechSynthesis.cancel();
  let idx = 0;
  let done = false;
  const finish = () => { if(done) return; done = true; clearTimeout(safety); onDone(); };
  // safety net in case a device's TTS engine stalls or never fires onend
  const safety = setTimeout(finish, 7000);

  function speakNext(){
    if(idx >= words.length){ finish(); return; }
    const utter = new SpeechSynthesisUtterance(words[idx]);
    utter.lang = "zh-CN";
    utter.rate = 0.85;
    idx++;
    utter.onend = speakNext;
    utter.onerror = speakNext;
    window.speechSynthesis.speak(utter);
  }
  speakNext();
}

/* =====================================================================
   STORAGE
   ===================================================================== */
const STORAGE_KEY = "hanzi-hero-progress-v1";
let STATE = {
  unlockedLevel: 1,
  levelStars: {},     // { "1": 3, "2": 2, ... }
  mistakes: {},        // { "的": "de", ... }  chars ever missed & not yet cleared
  learned: {}          // { "的": true, ... }  chars ever answered correctly
};

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      STATE = Object.assign(STATE, parsed);
    }
  }catch(e){ /* no saved state yet, use defaults */ }
  renderHome();
}
async function saveState(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(STATE), false);
  }catch(e){ console.warn("save failed", e); }
}

/* =====================================================================
   NAV
   ===================================================================== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo(0,0);
}

/* =====================================================================
   HOME SCREEN
   ===================================================================== */
function renderHome(){
  document.getElementById("learnedCount").textContent = Object.keys(STATE.learned).length;

  const mistakeKeys = Object.keys(STATE.mistakes);
  const reviewCard = document.getElementById("reviewCard");
  if(mistakeKeys.length > 0){
    reviewCard.classList.remove("hidden");
    document.getElementById("reviewCount").textContent = mistakeKeys.length;
    reviewCard.onclick = () => startReview();
  } else {
    reviewCard.classList.add("hidden");
  }

  const path = document.getElementById("levelPath");
  path.innerHTML = "";
  for(let i=0;i<LEVELS.length;i++){
    const lvl = LEVELS[i];
    const row = document.createElement("div");
    row.className = "level-row" + (i % 2 === 1 ? " right" : "");

    const wrap = document.createElement("div");
    wrap.className = "level-node-wrap";

    const node = document.createElement("div");
    const isDone = !!STATE.levelStars[lvl.id];
    const isLocked = lvl.id > STATE.unlockedLevel;
    const isCurrent = lvl.id === STATE.unlockedLevel && !isDone;
    node.className = "level-node" + (isLocked ? " locked" : "") + (isDone ? " done" : "") + (isCurrent ? " current" : "");
    node.innerHTML = monsterEmoji(lvl.theme);
    const numTag = document.createElement("div");
    numTag.className = "level-num";
    numTag.textContent = lvl.id;
    node.appendChild(numTag);
    if(isLocked){
      const lockB = document.createElement("div");
      lockB.className = "lock-badge";
      lockB.textContent = "🔒";
      node.appendChild(lockB);
    }
    node.onclick = () => { if(!isLocked) startLevel(lvl.id); };

    const starsDiv = document.createElement("div");
    starsDiv.className = "level-stars";
    starsDiv.textContent = isDone ? "★".repeat(STATE.levelStars[lvl.id]) + "☆".repeat(3-STATE.levelStars[lvl.id]) : "";

    wrap.appendChild(node);
    wrap.appendChild(starsDiv);
    row.appendChild(wrap);
    path.appendChild(row);

    if(i < LEVELS.length - 1){
      const conn = document.createElement("div");
      conn.className = "connector";
      path.appendChild(conn);
    }
  }
  showScreen("screen-home");
}

function monsterEmoji(theme){
  const map = { rock:"🪨", ice:"❄️", fire:"🔥", wind:"🌪️", shadow:"🌑", cosmic:"⭐" };
  return `<span style="font-size:30px">${map[theme] || "👾"}</span>`;
}

/* =====================================================================
   BATTLE ENGINE
   ===================================================================== */
let battle = null; // current battle state

function buildQueue(chars){
  // shuffle
  const arr = chars.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function pickDistractors(correctPinyin, count){
  const pool = [];
  const allChars = LEVELS.flatMap(l => l.chars);
  const seen = new Set([correctPinyin]);
  // shuffle a copy for randomness
  const shuffled = allChars.slice().sort(()=>Math.random()-0.5);
  for(const c of shuffled){
    if(!seen.has(c.p)){
      seen.add(c.p);
      pool.push(c.p);
      if(pool.length >= count) break;
    }
  }
  return pool;
}

function startLevel(levelId){
  const lvl = LEVELS.find(l => l.id === levelId);
  battle = {
    mode: "level",
    levelId: levelId,
    monsterName: lvl.monster,
    theme: lvl.theme,
    totalCount: lvl.chars.length,
    clearedSet: new Set(),
    queue: buildQueue(lvl.chars),
    mistakesThisRun: 0,
  };
  renderBattleShell();
  nextQuestion();
}

function startReview(){
  const chars = Object.keys(STATE.mistakes).map(h => CHAR_INDEX[h] || {h, p: STATE.mistakes[h], w:[]});
  battle = {
    mode: "review",
    levelId: null,
    monsterName: "复习怪兽",
    theme: "shadow",
    totalCount: chars.length,
    clearedSet: new Set(),
    queue: buildQueue(chars),
    mistakesThisRun: 0,
  };
  renderBattleShell();
  nextQuestion();
}

function renderBattleShell(){
  const colors = THEME_COLORS[battle.theme];
  const arena = document.getElementById("arena");
  arena.style.setProperty("--arena-a", colors.a);
  arena.style.setProperty("--arena-b", colors.b);

  document.getElementById("battleLevelNum").textContent = battle.levelId || "复习";
  document.getElementById("battleMonsterName").textContent = battle.monsterName;
  document.getElementById("monsterHpName").textContent = battle.monsterName;
  document.querySelector("#monsterSvg use").setAttribute("href", "#svg-monster-" + battle.theme);

  updateHpBars();
  showScreen("screen-battle");
  ensureAudio();
  SFX.powerUp();
}

function updateHpBars(){
  const clearedCount = battle.clearedSet.size;
  const heroPct = Math.round((clearedCount / battle.totalCount) * 100);
  const monsterPct = 100 - heroPct;
  document.getElementById("heroHp").style.width = heroPct + "%";
  document.getElementById("heroHpLabel").textContent = heroPct + "%";
  document.getElementById("monsterHp").style.width = monsterPct + "%";
  document.getElementById("monsterHpLabel").textContent = monsterPct + "%";
}

function renderQueueStrip(){
  const strip = document.getElementById("queueStrip");
  strip.innerHTML = "";
  battle.queue.forEach((c, idx) => {
    const chip = document.createElement("div");
    chip.className = "queue-chip" + (idx === 0 ? " active" : "");
    chip.textContent = c.h;
    strip.appendChild(chip);
  });
}

function nextQuestion(){
  if(battle.queue.length === 0){
    finishBattle();
    return;
  }
  renderQueueStrip();
  const current = battle.queue[0];
  document.getElementById("hanziBig").textContent = current.h;

  const hintsWrap = document.getElementById("wordHints");
  hintsWrap.innerHTML = "";
  const words = CHAR_WORDS[current.h] || [];
  words.forEach(w => {
    const chip = document.createElement("span");
    chip.className = "word-chip";
    chip.textContent = w;
    hintsWrap.appendChild(chip);
  });

  const distractors = pickDistractors(current.p, 3);
  const options = [current.p, ...distractors];
  for(let i=options.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [options[i],options[j]] = [options[j],options[i]];
  }

  const optsWrap = document.getElementById("options");
  optsWrap.innerHTML = "";
  options.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = p;
    btn.onclick = () => handleAnswer(p === current.p, btn, current);
    optsWrap.appendChild(btn);
  });
}

function handleAnswer(isCorrect, btnEl, current){
  document.querySelectorAll(".opt-btn").forEach(b => b.setAttribute("disabled","true"));
  ensureAudio();
  SFX.click();

  if(isCorrect){
    btnEl.classList.add("correct");
    battle.queue.shift();
    battle.clearedSet.add(current.h);
    STATE.learned[current.h] = true;
    delete STATE.mistakes[current.h];
    fireBeam();
    SFX.correctBeam();
    document.getElementById("monsterCombatant").classList.add("shake");
    setTimeout(()=> document.getElementById("monsterCombatant").classList.remove("shake"), 350);
  } else {
    btnEl.classList.add("wrong");
    // show correct one too
    document.querySelectorAll(".opt-btn").forEach(b => { if(b.textContent === current.p) b.classList.add("correct"); });
    battle.mistakesThisRun++;
    STATE.mistakes[current.h] = current.p;
    SFX.wrong();
    // requeue a few spots later
    battle.queue.shift();
    const insertAt = Math.min(3, battle.queue.length);
    battle.queue.splice(insertAt, 0, current);
    document.getElementById("heroCombatant").classList.add("shake");
    setTimeout(()=> document.getElementById("heroCombatant").classList.remove("shake"), 350);
  }

  // highlight the word-hint chips and read the vocabulary words aloud;
  // the next character will not appear until this finishes
  document.querySelectorAll(".word-chip").forEach(c => c.classList.add("speaking"));
  showReadingStatus(true);

  updateHpBars();
  saveState();

  setTimeout(() => {
    speakWordsThen(current.h, () => {
      showReadingStatus(false);
      nextQuestion();
    });
  }, 300);
}

function showReadingStatus(on){
  const el = document.getElementById("readingStatus");
  if(!el) return;
  el.classList.toggle("hidden", !on);
}

function fireBeam(){
  const arena = document.getElementById("arena");
  const beam = document.createElement("div");
  beam.className = "beam fire";
  beam.style.left = "40%";
  beam.style.top = "48%";
  beam.style.width = "22%";
  arena.appendChild(beam);
  setTimeout(()=> beam.remove(), 500);
}

function finishBattle(){
  const mistakes = battle.mistakesThisRun;
  let stars = 3;
  if(mistakes > 0 && mistakes <= 3) stars = 2;
  else if(mistakes > 3) stars = 1;

  SFX.monsterDown();
  setTimeout(() => SFX.victory(), 300);

  if(battle.mode === "level"){
    const prevStars = STATE.levelStars[battle.levelId] || 0;
    STATE.levelStars[battle.levelId] = Math.max(prevStars, stars);
    if(battle.levelId === STATE.unlockedLevel && STATE.unlockedLevel < LEVELS.length){
      STATE.unlockedLevel = battle.levelId + 1;
    }
    saveState();

    document.getElementById("resultBadge").textContent = "🎉";
    document.getElementById("resultTitle").textContent = battle.monsterName + " 被打败了！";
    document.getElementById("resultSub").textContent = "你认识了 " + battle.totalCount + " 个新汉字";
    document.getElementById("resultStars").textContent = "★".repeat(stars) + "☆".repeat(3-stars);

    const nextBtn = document.getElementById("nextLevelBtn");
    if(battle.levelId < LEVELS.length){
      nextBtn.textContent = "前往下一关";
      nextBtn.classList.remove("hidden");
      nextBtn.onclick = () => startLevel(battle.levelId + 1);
    } else {
      nextBtn.textContent = "太棒了，全部完成！";
      nextBtn.classList.remove("hidden");
      nextBtn.onclick = () => renderHome();
    }
  } else {
    saveState();
    document.getElementById("resultBadge").textContent = "📖";
    document.getElementById("resultTitle").textContent = "复习完成！";
    document.getElementById("resultSub").textContent = "怪兽笔记本里的字都复习了一遍";
    document.getElementById("resultStars").textContent = "★".repeat(stars) + "☆".repeat(3-stars);
    const nextBtn = document.getElementById("nextLevelBtn");
    nextBtn.classList.add("hidden");
  }

  document.getElementById("mapBtn").onclick = () => renderHome();
  showScreen("screen-result");
}

document.getElementById("backBtn").onclick = () => renderHome();

document.getElementById("soundToggle").onclick = () => {
  soundOn = !soundOn;
  document.getElementById("soundToggle").textContent = soundOn ? "🔊" : "🔇";
  if(soundOn){ ensureAudio(); SFX.click(); }
  else if("speechSynthesis" in window){ window.speechSynthesis.cancel(); }
};

/* =====================================================================
   BACKGROUND STARFIELD (decorative canvas)
   ===================================================================== */
(function starfield(){
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  const stars = Array.from({length:90}, () => ({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*1.4 + 0.3,
    o: Math.random()*0.6 + 0.2,
    tw: Math.random()*0.02 + 0.005
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width, canvas.height);
    for(const s of stars){
      s.o += s.tw;
      const alpha = Math.abs(Math.sin(s.o));
      ctx.fillStyle = `rgba(200,215,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* =====================================================================
   INIT
   ===================================================================== */
loadState();
</script>
